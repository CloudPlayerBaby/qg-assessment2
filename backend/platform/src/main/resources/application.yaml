spring:
  mail:
    host: smtp.163.com
    port: 465
    username: 13543768378@163.com
    password: ${MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 5000   # 5秒超时
          timeout: 5000
          writetimeout: 5000
    test-connection: false

  # ai
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
          temperature: 1.8
          top-p: 0.9

  # redis
  data:
    redis:
      host: localhost
      port: 6379

  cache:
    redis:
      cache-null-values: true

  #数据库
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  #文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# mp
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 阿里云
aliyun:
  oss:
    access-key-id: ${ALI_ACCESS_KEY_ID}
    access-key-secret: ${ALI_ACCESS_KEY_SECRET}
    endpoint: oss-cn-beijing.aliyuncs.com
    bucket: repair-system-demo

# 日志
logging:
  file:
    name: ./backend/platform/logs/app.log