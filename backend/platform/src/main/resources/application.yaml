spring:
  ai:
    dashscope:
      api-key: sk-c6d8d8b3b24b4715a88c811ec61e2ab7
      chat:
        options:
          model: qwen-plus

  datasource:
    url: jdbc:mysql://localhost:3306/platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 1234

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

aliyun:
  oss:
    access-key-id: ${ALI_ACCESS_KEY_ID}
    access-key-secret: ${ALI_ACCESS_KEY_SECRET}
    endpoint: oss-cn-beijing.aliyuncs.com
    bucket: repair-system-demo

# --- 日志配置 ---
logging:
  file:
    name: ./backend/platform/logs/app.log